name: Weekly parity

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  parity-full:
    name: Full parity matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://loudsrl.com

      - run: npx playwright install --with-deps chromium

      - name: Full parity (extended routes, all viewports)
        run: npx playwright test tests/parity-against-live.spec.ts tests/parity-menu.spec.ts
        env:
          CI: false
          PARITY_FULL: "1"

      - name: Generate failure report
        if: failure()
        run: node scripts/parity-diff-report.mjs

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-weekly-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
            docs/parity/
          retention-days: 30
