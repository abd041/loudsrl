name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://loudsrl.com

  e2e:
    name: Smoke + parity tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://loudsrl.com

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke
        env:
          CI: true

      - name: Parity tests (CI matrix)
        run: npx playwright test tests/parity-against-live.spec.ts
        env:
          CI: true

      - name: Parity failure report
        if: failure()
        run: node scripts/parity-diff-report.mjs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  lighthouse:
    name: Lighthouse thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://loudsrl.com

      - name: Start server
        run: |
          npm run start &
          npx wait-on http://127.0.0.1:3000 --timeout 120000

      - name: Lighthouse CI
        run: npm run lighthouse:ci
        env:
          LIGHTHOUSE_BASE_URL: http://127.0.0.1:3000
          LH_PERF_MIN: 85
          LH_PERF_MIN_HOME: 68
          LH_A11Y_MIN: 90

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: docs/lighthouse/
          retention-days: 30
